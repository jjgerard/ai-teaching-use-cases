services:
  - type: web
    name: case-study-catalog
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: catalog-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/catalog.db
